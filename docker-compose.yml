services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=test12345 # Change!!!
      - POSTGRES_DB=n8n
    volumes:
      - postgres_:/var/lib/postgresql/data
    networks:
      - n8n-network

  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=test12345  # Change!!!
      - DB_POSTGRESDB_DATABASE=n8n
      - N8N_HOST=localhost
      - WEBHOOK_URL=http://localhost:5678/
      #Proxy for api.telegram in RF
      # - HTTP_PROXY=http://user:pass@ip:port
      # - HTTPS_PROXY=http://user:pass@ip:port
    depends_on:
      - postgres
    volumes:
      - n8n_:/home/node/.n8n
    networks:
      - n8n-network

volumes:
  postgres_:
  n8n_:

networks:
  n8n-network:
